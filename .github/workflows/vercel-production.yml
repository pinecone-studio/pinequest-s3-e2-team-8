name: Deploy to Vercel Production

on:
  push:
    branches: [main, master]
    paths:
      - "team-8/**"
      - ".github/workflows/vercel-production.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: team-8
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
      VERCEL_ALIAS_DOMAIN: pinequest-e2-team-8.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: team-8/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}" --scope="${VERCEL_SCOPE}"

      - name: Build Project Artifacts
        run: vercel build --prod --token="${VERCEL_TOKEN}" --scope="${VERCEL_SCOPE}"

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          DEPLOYMENT_URL="$(vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" --scope="${VERCEL_SCOPE}" | tail -n 1)"
          echo "deployment_url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: ${DEPLOYMENT_URL}"

      - name: Point alias to latest production deployment
        run: |
          vercel alias set "${{ steps.deploy.outputs.deployment_url }}" "${VERCEL_ALIAS_DOMAIN}" --token="${VERCEL_TOKEN}" --scope="${VERCEL_SCOPE}"
